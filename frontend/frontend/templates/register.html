<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - VibeVerse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <div class="auth-header">
        <a href="/" class="navbar-brand mb-4" style="display: inline-flex; margin-bottom: 1.5rem;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 18a2 2 0 0 0-2-2H9a2 2 0 0 0-2 2"/>
            <rect width="18" height="18" x="3" y="4" rx="2"/>
            <circle cx="12" cy="10" r="2"/>
            <line x1="8" x2="8" y1="2" y2="4"/>
            <line x1="16" x2="16" y1="2" y2="4"/>
          </svg>
          VibeVerse
        </a>
        <h1 class="auth-title">Create your account</h1>
        <p class="auth-subtitle">Join us on your journey to social confidence</p>
      </div>

      <div id="messageBox" class="message"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            class="form-input" 
            placeholder="Choose a username"
            required
            autocomplete="username"
          >
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="Create a password"
            required
            autocomplete="new-password"
          >
        </div>

        <div class="form-group">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            class="form-input" 
            placeholder="Confirm your password"
            required
            autocomplete="new-password"
          >
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login">Log in</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('registerForm');
      const messageBox = document.getElementById('messageBox');
      const submitBtn = document.getElementById('submitBtn');

      function showMessage(message, isError = true) {
        messageBox.textContent = message;
        messageBox.className = 'message show ' + (isError ? 'message-error' : 'message-success');
      }

      function hideMessage() {
        messageBox.className = 'message';
      }

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        hideMessage();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!username || !password || !confirmPassword) {
          showMessage('Please fill in all fields.');
          return;
        }

        if (password !== confirmPassword) {
          showMessage('Passwords do not match.');
          return;
        }

        if (password.length < 4) {
          showMessage('Password must be at least 4 characters long.');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating account...';

        try {
          const response = await fetch('/api/register', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username, password }),
          });

          const data = await response.json();

          if (data.success) {
            showMessage('Account created successfully! Redirecting to login...', false);
            setTimeout(() => {
              window.location.href = '/login';
            }, 1500);
          } else {
            showMessage(data.message || 'Registration failed. Please try again.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create Account';
          }
        } catch (error) {
          showMessage('An error occurred. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Account';
        }
      });
    });
  </script>
</body>
</html>
