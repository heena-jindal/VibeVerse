<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music — vibeverse</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-logo">← SocialCompanion</a>
        <a href="/chat" class="nav-btn">Back to Chat</a>
    </nav>

    <div class="music-wrapper">

        <h2 class="history-title">Music for Your Mood 🎵</h2>
        <p style="color:#888;font-size:14px;margin-top:-12px;margin-bottom:24px">
            Music recommended based on how you're feeling right now
        </p>

        <!-- Current mood + playlist card -->
        <div class="music-card" id="musicCard">
            <div class="music-loading">Finding the right music for you...</div>
        </div>

        <!-- Manual mood selector -->
        <div class="music-selector-card">
            <div style="font-size:13px;font-weight:600;color:#534AB7;margin-bottom:10px">
                Or pick a mood manually:
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px">
                <button class="mood-music-btn" onclick="loadMusic('very anxious')">Very Anxious</button>
                <button class="mood-music-btn" onclick="loadMusic('nervous')">Nervous</button>
                <button class="mood-music-btn" onclick="loadMusic('confused')">Confused</button>
                <button class="mood-music-btn" onclick="loadMusic('okay')">Okay</button>
                <button class="mood-music-btn" onclick="loadMusic('confident')">Confident</button>
            </div>
        </div>

        <!-- Spotify info note -->
        <div class="music-note">
            🎧 Music plays via Spotify. A free Spotify account lets you
            listen to 30-second previews. Premium plays the full track.
        </div>

    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Load music based on current mood automatically
        fetch('/api/music')
            .then(r => r.json())
            .then(data => renderMusicCard(data))
            .catch(() => {
                document.getElementById('musicCard').innerHTML =
                    '<p style="color:#aaa;padding:16px">Could not load music. Try again.</p>';
            });
    });

    function loadMusic(mood) {
        // Manually load playlist for selected mood
        const card = document.getElementById('musicCard');
        card.innerHTML = '<div class="music-loading">Loading playlist...</div>';

        // Map mood to playlist directly on frontend
        const playlists = {
            'very anxious': { name:'Deep Calm', playlist_id:'37i9dQZF1DX3Ogo9pFvBkY', description:'Gentle sounds to ease anxiety', color:'#E1F5EE' },
            'nervous':      { name:'Soothing Vibes', playlist_id:'37i9dQZF1DWZqd5JICZI0u', description:'Calming music for nerves', color:'#EEEDFE' },
            'confused':     { name:'Clear Your Head', playlist_id:'37i9dQZF1DWZeKCadgRdKQ', description:'Focus music to think clearly', color:'#E6F1FB' },
            'okay':         { name:'Feel Good Mix', playlist_id:'37i9dQZF1DX3rxVfibe1L0', description:'Uplifting tunes', color:'#FAEEDA' },
            'confident':    { name:'Power Up', playlist_id:'37i9dQZF1DWUa8ZRTfalHk', description:'High energy music', color:'#EAF3DE' },
        };
        renderMusicCard({ ...playlists[mood], mood });
    }

    function renderMusicCard(data) {
        const card = document.getElementById('musicCard');
        card.style.background = data.color || '#EEEDFE';

        card.innerHTML = `
            <div class="music-card-top">
                <div>
                    <div class="music-mood-badge">mood: ${data.mood}</div>
                    <div class="music-playlist-name">${data.name}</div>
                    <div class="music-playlist-desc">${data.description}</div>
                </div>
            </div>

            <!-- Spotify Embed Player -->
            <iframe
                src="https://open.spotify.com/embed/playlist/${data.playlist_id}?utm_source=generator&theme=0"
                width="100%"
                height="352"
                frameborder="0"
                allowfullscreen=""
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="lazy"
                style="border-radius:12px;margin-top:16px">
            </iframe>
        `;
    }
    </script>
</body>
</html>
